version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - smartwifi_net

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: smartwifi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - smartwifi_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - JWT_SECRET_KEY=yoursecretkeyhere_change_it_in_prod
      - DATABASE_URL=postgresql+asyncpg://postgres:postgrespassword@db:5432/smartwifi
      - DATABASE_URL_SYNC=postgresql://postgres:postgrespassword@db:5432/smartwifi
      - MIKROTIK_HOST=192.168.88.1
      - MIKROTIK_USER=admin
      - MIKROTIK_PASSWORD=admin
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - smartwifi_net

networks:
  smartwifi_net:
    driver: bridge

volumes:
  postgres_data:
